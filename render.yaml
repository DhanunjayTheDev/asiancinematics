services:
  - type: web
    name: asiancinematics-server
    runtime: node
    plan: free
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        value: https://asiancinematics.onrender.com
      - key: ADMIN_URL
        value: https://asiancinematics-admin.onrender.com
